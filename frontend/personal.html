<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Personal Use - SilentTalk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <img src="logo.jpeg" alt="SilentTalk Logo" class="logo">
        <h1>Personal Mode</h1>
    </header>

    <main class="container">
        <button id="flip-btn">Flip Camera</button>

        <div class="dashboard">
            <div class="panel left">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>

            <div class="panel right">
                <div style="margin-bottom: 12px;">
                    <a href="capture.html" class="button" style="padding: 10px 16px; background: #6d4c14; color: white; border-radius: 6px; text-decoration: none;">Open Dataset Capture</a>
                </div>
                <h2>اردو ٹائپنگ</h2>
                <p id="debug-prediction">Waiting for detection...</p>

                <div class="output-box">
                    <textarea id="output" readonly></textarea>
                </div>

                <div style="margin-top:15px;">
                    <button onclick="clearText()">Clear</button>
                </div>

                <div class="speech-controls">
                    <button id="speak-btn" type="button">Play Audio</button>
                    <button id="stop-speak-btn" type="button">Stop Audio</button>
                </div>
                <p id="speech-status">Ready to speak</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="landmark_features.js"></script>
    <script src="mediapipe_predictor.js"></script>
    <script src="sign.js"></script>
</body>
</html>
