<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Organizational Use - SilentTalk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Organizational Mode</h1>
    </header>

    <main class="container">
        <p>Speech input will be converted to text here for classrooms and seminars.</p>
        <button id="start-btn">Start Listening</button>
        <button id="stop-btn">Stop Listening</button>
        <p id="status-text">Press Start to begin</p>
        <p id="speech-text">Recognized speech will appear here...</p>
    </main>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        let recognition;
        let isListening = false;

        const speechText = document.getElementById("speech-text");
        const statusText = document.getElementById("status-text");
        const startBtn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");

        function initRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert("Your browser does not support speech recognition.");
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();

            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                statusText.innerText = "Listening...";
            };

            recognition.onresult = (event) => {
                let finalTranscript = "";
                let interimTranscript = "";

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) finalTranscript += transcript + " ";
                    else interimTranscript += transcript;
                }

                // Update text in real time
                speechText.innerText = finalTranscript + interimTranscript;
            };

            recognition.onspeechend = () => {
                if (isListening) statusText.innerText = "Waiting for speech...";
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech') statusText.innerText = "No speech detected. Speak clearly!";
                else if (event.error === 'audio-capture') statusText.innerText = "Microphone not found or blocked!";
                else statusText.innerText = "Error: " + event.error;
            };

            recognition.onend = () => {
                if (isListening) recognition.start(); // auto-restart
            };
        }

        startBtn.addEventListener("click", () => {
            if (!recognition) initRecognition();
            recognition.start();
        });

        stopBtn.addEventListener("click", () => {
            if (recognition && isListening) {
                isListening = false;
                recognition.stop();
                statusText.innerText = "Stopped listening.";
            }
        });
    });
    </script>
</body>
</html>
